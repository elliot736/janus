services:
  # API
  - type: web
    name: janus-api
    runtime: docker
    dockerfilePath: docker/Dockerfile.api
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: janus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: janus-redis
          type: redis
          property: connectionString
      - key: HMAC_SECRET
        generateValue: true
      - key: TOKEN_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: janus-dashboard
          type: web
          property: url
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

  # Dashboard
  - type: web
    name: janus-dashboard
    runtime: docker
    dockerfilePath: docker/Dockerfile.dashboard
    dockerContext: .
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: janus-api
          type: web
          property: url
      - key: BETTER_AUTH_URL
        fromService:
          name: janus-api
          type: web
          property: url
      - key: NODE_ENV
        value: production

  # Redis
  - type: redis
    name: janus-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # PostgreSQL
  - name: janus-db
    plan: starter
    databaseName: janus
    user: janus

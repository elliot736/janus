name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this solve? Why do you need it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What else did you consider? Why didn't it work?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API / Detection engine
        - Dashboard
        - SDK
        - Integration packages
        - Documentation
        - Infrastructure
        - Other

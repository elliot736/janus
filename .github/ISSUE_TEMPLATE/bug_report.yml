name: Bug Report
description: Report a bug in Janus
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Dashboard
        - SDK
        - "@janus/react"
        - "@janus/nextjs"
        - "@janus/express"
        - Documentation
        - Infrastructure / Terraform
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 14
        Node: 20.11
        Browser: Chrome 122
        Deploy: Docker Compose / AWS / local dev

name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Set version from input
        if: inputs.version
        run: npm version ${{ inputs.version }} --no-git-tag-version
        working-directory: packages/sdk

      - name: Build SDK
        run: npm run build -- --filter=@janus/sdk

      - name: Check bundle size
        run: |
          MAX_SIZE=10240  # 10KB in bytes
          GZIP_SIZE=$(gzip -c packages/sdk/dist/janus.js | wc -c | tr -d ' ')
          echo "Gzipped bundle size: ${GZIP_SIZE} bytes"
          if [ "$GZIP_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Bundle size ${GZIP_SIZE} bytes exceeds limit of ${MAX_SIZE} bytes (10KB gzipped)"
            exit 1
          fi
          echo "Bundle size OK: ${GZIP_SIZE} / ${MAX_SIZE} bytes"

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

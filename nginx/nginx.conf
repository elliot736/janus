worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 15s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security — hide Nginx version
    server_tokens off;

    # Slowloris & connection abuse protection
    client_body_timeout 5s;
    client_header_timeout 5s;
    send_timeout 10s;
    large_client_header_buffers 4 8k;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=challenge:20m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=verify:20m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=siteverify:20m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;

    # Connection limit zone
    limit_conn_zone $binary_remote_addr zone=addr:20m;

    include /etc/nginx/conf.d/*.conf;
}

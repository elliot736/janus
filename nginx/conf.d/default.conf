upstream janus_api {
    server janus-api:3001;
    keepalive 32;
}

upstream janus_dashboard {
    server janus-dashboard:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Max payload — SDK payload should never exceed 64KB
    client_max_body_size 64k;

    # Connection limit per IP
    limit_conn addr 20;

    # ── Security Headers ──────────────────────────────────────

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── SDK Static Assets ─────────────────────────────────────

    location /sdk.js {
        alias /var/www/janus/sdk/dist/janus.js;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        gzip on;
        gzip_types application/javascript;
    }

    # ── Public SDK Endpoints ──────────────────────────────────

    location = /api/v1/challenge {
        limit_req zone=challenge burst=20 nodelay;
        limit_conn addr 10;
        limit_except POST { deny all; }

        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    location = /api/v1/verify {
        limit_req zone=verify burst=10 nodelay;
        limit_conn addr 10;
        limit_except POST { deny all; }

        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── Server-to-Server Endpoint ─────────────────────────────

    location = /api/v1/siteverify {
        limit_req zone=siteverify burst=50 nodelay;
        limit_except POST { deny all; }

        # No CORS — server-to-server only
        add_header Access-Control-Allow-Origin "" always;

        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── Auth Endpoints ────────────────────────────────────────

    location /api/v1/auth/sign-in {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    location /api/v1/auth/sign-up {
        limit_req zone=auth burst=2 nodelay;

        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── All Other API Routes (dashboard management) ───────────

    location /api/ {
        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── Better Auth Routes ────────────────────────────────────

    location /api/auth/ {
        proxy_pass http://janus_api;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── Dashboard ─────────────────────────────────────────────

    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        proxy_pass http://janus_dashboard;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # ── Block dotfiles ────────────────────────────────────────

    location ~ /\. {
        deny all;
        return 404;
    }
}
